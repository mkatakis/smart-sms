openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SMS Reseller Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resellers
    description: Reseller management
  - name: clients
    description: Client management
  - name: messages
    description: SMS message operations
  - name: credits
    description: Credit management
  - name: stats
    description: Dashboard statistics
  - name: gateway
    description: GatewayAPI operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /resellers:
    get:
      operationId: listResellers
      tags: [resellers]
      summary: List all resellers
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of resellers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reseller"
    post:
      operationId: createReseller
      tags: [resellers]
      summary: Create a new reseller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResellerInput"
      responses:
        "201":
          description: Created reseller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"

  /resellers/{id}:
    get:
      operationId: getReseller
      tags: [resellers]
      summary: Get a reseller by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reseller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"
        "404":
          description: Not found
    patch:
      operationId: updateReseller
      tags: [resellers]
      summary: Update a reseller
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResellerUpdate"
      responses:
        "200":
          description: Updated reseller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"
        "404":
          description: Not found
    delete:
      operationId: deleteReseller
      tags: [resellers]
      summary: Delete a reseller
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /resellers/{id}/credits:
    post:
      operationId: topupResellerCredits
      tags: [resellers, credits]
      summary: Add credits to a reseller
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditTopup"
      responses:
        "200":
          description: Updated reseller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reseller"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - in: query
          name: resellerId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/credits:
    post:
      operationId: topupClientCredits
      tags: [clients, credits]
      summary: Add credits to a client
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditTopup"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List SMS messages
      parameters:
        - in: query
          name: resellerId
          schema:
            type: integer
        - in: query
          name: clientId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmsMessage"

  /messages/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send an SMS message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsMessage"
        "400":
          description: Bad request (e.g. insufficient credits)

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a message by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsMessage"
        "404":
          description: Not found

  /credits/transactions:
    get:
      operationId: listCreditTransactions
      tags: [credits]
      summary: List credit transactions
      parameters:
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: entityId
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of credit transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditTransaction"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /gateway/balance:
    get:
      operationId: getGatewayBalance
      tags: [gateway]
      summary: Get GatewayAPI credit balance (admin only)
      responses:
        "200":
          description: Current balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayBalance"
        "403":
          description: Forbidden
        "502":
          description: GatewayAPI unreachable

  /stats/messages:
    get:
      operationId: getMessageStats
      tags: [stats]
      summary: Get message delivery stats by status
      responses:
        "200":
          description: Message stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageStatItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Reseller:
      type: object
      required: [id, name, email, status, credits, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        status:
          type: string
        credits:
          type: integer
        apiKey:
          type: ["string", "null"]
        createdAt:
          type: string

    ResellerInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        credits:
          type: integer

    ResellerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        status:
          type: string

    Client:
      type: object
      required: [id, resellerId, name, email, status, credits, createdAt]
      properties:
        id:
          type: integer
        resellerId:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        status:
          type: string
        credits:
          type: integer
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [resellerId, name, email]
      properties:
        resellerId:
          type: integer
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        credits:
          type: integer

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        status:
          type: string

    SmsMessage:
      type: object
      required: [id, toNumber, fromNumber, body, status, creditsCost, createdAt]
      properties:
        id:
          type: integer
        resellerId:
          type: ["integer", "null"]
        clientId:
          type: ["integer", "null"]
        toNumber:
          type: string
        fromNumber:
          type: string
        body:
          type: string
        status:
          type: string
        creditsCost:
          type: integer
        gatewayMessageId:
          type: ["string", "null"]
        gatewayErrorText:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
        createdAt:
          type: string

    SendMessageInput:
      type: object
      required: [toNumber, fromNumber, body]
      properties:
        resellerId:
          type: integer
        clientId:
          type: integer
        toNumber:
          type: string
          minLength: 1
        fromNumber:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1

    CreditTransaction:
      type: object
      required: [id, entityType, entityId, amount, type, description, createdAt]
      properties:
        id:
          type: integer
        entityType:
          type: string
        entityId:
          type: integer
        amount:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string

    CreditTopup:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          minimum: 1
        description:
          type: string

    DashboardStats:
      type: object
      required: [totalResellers, activeResellers, totalClients, activeClients, totalMessagesSent, totalCreditsIssued, recentMessages]
      properties:
        totalResellers:
          type: integer
        activeResellers:
          type: integer
        totalClients:
          type: integer
        activeClients:
          type: integer
        totalMessagesSent:
          type: integer
        totalCreditsIssued:
          type: integer
        recentMessages:
          type: array
          items:
            $ref: "#/components/schemas/SmsMessage"

    MessageStatItem:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    GatewayBalance:
      type: object
      required: [credit, currency]
      properties:
        credit:
          type: string
        currency:
          type: string
